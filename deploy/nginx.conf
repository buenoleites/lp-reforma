# Config do nginx DENTRO do contêiner reforma.
# O Traefik termina o HTTPS; aqui o nginx só serve os estáticos em HTTP:80.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Página única: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome podem ter cache longo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compressão (o JS/CSS encolhe bastante)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
