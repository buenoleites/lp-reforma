# Config do nginx DENTRO do contêiner da LP.
# O Traefik termina o HTTPS e roteia por CAMINHO (PathPrefix); aqui o nginx
# apenas serve os estáticos em HTTP:80.
#
# A build é copiada para /usr/share/nginx/html/<app> (ver Dockerfile) e a
# página é acessada em https://mkt.unyflex.com.br/<app>.
# Este arquivo é genérico de propósito: o mesmo conteúdo serve qualquer LP
# sem edição — só muda a subpasta criada pelo Dockerfile.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash no nome: cache longo e imutável.
    location ~* \.(?:js|css|woff2?|ttf|png|jpe?g|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA por app: /<app> e /<app>/qualquer-rota caem no index.html daquele app.
    location ~ ^/(?<app>[^/]+) {
        try_files $uri $uri/ /$app/index.html;
    }

    # Compressão (o JS/CSS encolhe bastante).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
