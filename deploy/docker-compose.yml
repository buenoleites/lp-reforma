# Landing page "Reforma Tributária" servida como contêiner estático atrás do
# Traefik que já roda na VPS (mesmo padrão do /opt/n8n).
#
# - A própria imagem compila a LP e serve os estáticos (ver Dockerfile)
# - Entra na rede externa n8n_default para o Traefik conseguir alcançá-lo
# - O Traefik roteia por CAMINHO: mkt.unyflex.com.br/reforma -> este contêiner
#
# Deploy / atualização (na VPS, a partir da raiz do repositório):
#   git pull
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Para criar uma nova LP a partir deste esqueleto, troque "reforma" por
# "licitacoes" (ou outro nome) em TODO este arquivo, na base do vite.config.js
# e na pasta de destino do Dockerfile.

services:
  reforma:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: lp-reforma
    container_name: reforma
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      # Site em HTTPS (entrada websecure) + certificado automático "le"
      - "traefik.http.routers.reforma.entrypoints=websecure"
      - "traefik.http.routers.reforma.rule=Host(`mkt.unyflex.com.br`) && PathPrefix(`/reforma`)"
      - "traefik.http.routers.reforma.tls=true"
      - "traefik.http.routers.reforma.tls.certresolver=le"
      - "traefik.http.services.reforma.loadbalancer.server.port=80"
      # Redireciona http:// -> https://
      - "traefik.http.routers.reforma-web.entrypoints=web"
      - "traefik.http.routers.reforma-web.rule=Host(`mkt.unyflex.com.br`) && PathPrefix(`/reforma`)"
      - "traefik.http.routers.reforma-web.middlewares=reforma-redirect"
      - "traefik.http.middlewares.reforma-redirect.redirectscheme.scheme=https"

# Rede já criada pelo stack do n8n/Traefik — apenas reutilizamos.
networks:
  n8n_default:
    external: true
